<div class="modal fade" data-bs-backdrop="static" tabindex="0" @keydown.enter="confirm($event)">
	<div class="modal-dialog modal-dialog-centered">
		<div class="modal-content">
			<div class="modal-header">
				<h5 class="modal-title">File</h5>
				<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
			</div>
			<div class="modal-body">
				<div class="container-fluid">
					<div class="row" v-for="file in files">
						<native-file-item :file="file"></native-file-item>
					</div>
				</div>
			</div>
			<div class="modal-footer">
				<button class="btn btn-primary" v-on:click="confirm();">Send</button>
			</div>
		</div>
	</div>
</div>
