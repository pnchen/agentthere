<div>
	<div class="position-absolute top-0 end-0 mt-3 me-3">
		<action-menu>
			<template v-slot:toggle>
				<img v-if="settings.profile.avatar" :src="settings.profile.avatar" class="me-2" style="height: 1.6rem" />
				<small>{{ settings.profile.name || '' }}</small>
			</template>
			<a class="dropdown-item" href="javascript:;" @click="params.profile_open = true">Profile</a>
			<a class="dropdown-item" href="javascript:;" @click="params.settings_open = true">Settings</a>
		</action-menu>
	</div>
	<div class="container" style="min-height: 540px">
		<div class="row">
			<div class="col-12 text-dark text-center my-5">
				<div class="d-inline-block text-center">
					<img class="p-3" style="max-width: 240px" src="assets/image/logo.png" />
					<br />
					<h1>AgentThere</h1>
				</div>
			</div>
		</div>

		<div class="row mt-3">
			<div class="col-12" style="max-width: 28rem; margin: 0 auto">
				<div class="card shadow-sm">
					<div class="card-body p-3">
						<!-- Profile row: avatar + name -->
						<div class="d-flex align-items-center gap-3 mb-3">
							<div style="width: 48px; height: 48px; flex-shrink: 0">
								<avatar
									class="d-none"
									ref="avatar"
									:variant="settings.profile.boring_avatar.variant"
									:colors="settings.profile.boring_avatar.colors"
									:name="settings.profile.boring_avatar.salt"
									:size="48"
								/>
								<img v-if="settings.profile.avatar" :src="settings.profile.avatar" style="width: 48px; height: 48px; border-radius: 50%; object-fit: cover" />
								<div v-else style="width: 48px; height: 48px; border-radius: 50%; background: #e9ecef; display: flex; align-items: center; justify-content: center">
									<i class="las la-user text-muted fs-5"></i>
								</div>
							</div>
							<div class="flex-grow-1">
								<input type="text" class="form-control" placeholder="How should the AI call you?" v-model.trim="settings.profile.name" @input="generate_avatar()" />
								<button v-if="settings.profile.name" type="button" class="btn btn-sm btn-link text-muted px-0 mt-1" @click="random_salt(); generate_avatar()">Random avatar</button>
							</div>
						</div>

						<!-- Group name -->
						<label class="form-label">Chatting group</label>
						<input type="text" class="form-control" placeholder="Enter a group name to start" v-model.trim="params.channel" />

						<!-- Alert -->
						<div v-if="!settings.signaling.url || !settings.signaling.namespace" class="alert alert-warning text-center py-2 mt-3 mb-0">
							<i class="las la-exclamation-triangle me-2"></i>
							Broker or namespace not configured.
							<a class="ms-2 fw-semibold" href="javascript:;" @click="params.settings_open = true">Configure</a>
						</div>

						<!-- GO -->
						<button
							class="btn btn-primary w-100 mt-3"
							type="button"
							:disabled="!params.channel || !settings.signaling.url || !settings.signaling.namespace || !settings.profile.name"
							@click="$router.push({ path: '/group/' + params.channel })"
						>
							GO
						</button>
					</div>
				</div>
			</div>
		</div>
	</div>
	<update-profile v-if="params.profile_open" @cancel="params.profile_open = false" @ok="params.profile_open = false"></update-profile>
	<system-settings v-if="params.settings_open" @cancel="params.settings_open = false" @ok="params.settings_open = false"></system-settings>
</div>
